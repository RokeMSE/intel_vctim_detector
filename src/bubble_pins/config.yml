data:
  class_path: anomalib.data.Folder
  init_args:
    root: ./datasets/socket_pins
    normal_dir: "train/good"
    abnormal_dir: "test/defect"  # Add explicit defect folder
    image_size: 256
    task: segmentation  # Changed from classification
    train_batch_size: 16  # Reduced from 32 for larger model
    eval_batch_size: 16
    num_workers: 4  # Reduced from 8 to prevent memory issues
    augmentations:
      class_path: torchvision.transforms.v2.Compose
      init_args:
        transforms:
          - class_path: torchvision.transforms.v2.Resize
            init_args:
              size: [288, 288]  # Slightly larger for better features
          - class_path: torchvision.transforms.v2.CenterCrop
            init_args:
              size: [256, 256]
          - class_path: torchvision.transforms.v2.RandomRotation
            init_args:
              degrees: 15
          - class_path: torchvision.transforms.v2.ColorJitter
            init_args:
              brightness: 0.1
              contrast: 0.1
          - class_path: torchvision.transforms.v2.ToDtype
            init_args:
              dtype: torch.float32
              scale: true
          - class_path: torchvision.transforms.v2.Normalize
            init_args:
              mean: [0.485, 0.456, 0.406]
              std: [0.229, 0.224, 0.225]
model:
  class_path: anomalib.models.Patchcore
  init_args:
    backbone: wide_resnet50_2  # Consistent with better performance
    pre_trained: true
    layers:
      - layer2
      - layer3
    coreset_sampling_ratio: 0.25  # Increased from 0.1
    num_neighbors: 15  # Increased from 9
metrics:
  image:
    - F1Score
    - AUROC
    - Precision
    - Recall
  pixel:
    - F1Score
    - AUROC
    - Precision
    - Recall
  threshold:
    class_path: anomalib.metrics.F1AdaptiveThreshold
    init_args:
      default_value: 0.3  # Lower threshold for better recall